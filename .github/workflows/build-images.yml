name: Build images

on:
  push:
    tags:
    - '*-v*.*.*'
  workflow_dispatch:
    inputs:
      IMAGES:
        description: Comma separated list of images to build (leave empty to build all active images)
        required: false
        type: string
      FORCE:
        description: Rebuild even if the image:tag already exists in the registry
        required: false
        type: boolean
        default: false

jobs:
  matrix:
    name: Resolve build matrix
    runs-on: ubuntu-24.04
    outputs:
      images: ${{ steps.resolve.outputs.IMAGES }}
    steps:
    - name: Checks-out repository
      uses: actions/checkout@v7

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
        logout: true

    - name: Resolve images to build
      id: resolve
      run: |
        if [ "${{ github.ref_type }}" == "tag" ]; then
          IMAGE_NAME="${GITHUB_REF_NAME%-v*}"
          IMAGES=$(jq -c --arg name "$IMAGE_NAME" '[.[] | select(.name == $name)]' ci/matrix.json)
        elif [ -n "${{ inputs.IMAGES }}" ]; then
          # Explicit selection bypasses the deprecated filter (e.g. to patch a legacy image before removal).
          JQ_FILTER=$(echo "${{ inputs.IMAGES }}" | jq -R 'split(",")')
          IMAGES=$(jq -c --argjson names "$JQ_FILTER" '[.[] | select(.name | IN($names[]))]' ci/matrix.json)
        else
          IMAGES=$(jq -c '[.[] | select(.deprecated != true)]' ci/matrix.json)
        fi

        # Resolve each image's version. matrix.json no longer carries a `tag` field for
        # actively-released images (release-please's extra-files JSON updater corrupts a
        # root-array file like matrix.json - see docs/04-docker.md). The release-please
        # manifest is the authoritative current version instead. Deprecated images aren't
        # release-please-managed, so matrix.json's own frozen `tag` is kept for those.
        MANIFEST=$(cat .release-please-manifest.json)
        IMAGES=$(echo "$IMAGES" | jq -c --argjson manifest "$MANIFEST" '
          map(.build.tag = (.build.tag // $manifest["docker/utils/" + .name]))
        ')

        # Skip images whose exact tag is already published (e.g. release-please bootstrap
        # tags matching an already-shipped version). --FORCE bypasses this for manual dispatch.
        if [ "${{ inputs.FORCE }}" != "true" ]; then
          FILTERED="[]"
          # `for row in $(...)` would word-split each JSON object's own spaces (e.g. inside
          # "description") instead of just splitting on jq's newline-per-element output -
          # read it line-by-line instead so each $row stays one intact JSON object.
          while IFS= read -r row; do
            NAME=$(echo "$row" | jq -r '.name')
            TAG=$(echo "$row" | jq -r '.build.tag')
            if docker manifest inspect "ghcr.io/this-is-tobi/tools/${NAME}:${TAG}" > /dev/null 2>&1; then
              echo "Skipping ${NAME}:${TAG} - already published"
            else
              FILTERED=$(echo "$FILTERED" | jq -c --argjson row "$row" '. + [$row]')
            fi
          done < <(echo "$IMAGES" | jq -c '.[]')
          IMAGES="$FILTERED"
        fi

        echo "Resolved images: $IMAGES"
        echo "IMAGES=$IMAGES" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.image.name }}
    needs: matrix
    if: ${{ needs.matrix.outputs.images != '[]' }}
    uses: this-is-tobi/github-workflows/.github/workflows/build-docker.yml@v0
    permissions:
      packages: write
      contents: read
      id-token: write
      attestations: write
    strategy:
      matrix:
        image: ${{ fromJSON(needs.matrix.outputs.images) }}
    with:
      IMAGE_NAME: ghcr.io/this-is-tobi/tools/${{ matrix.image.name }}
      IMAGE_TAG: ${{ matrix.image.build.tag }}
      IMAGE_CONTEXT: ${{ matrix.image.build.context }}
      IMAGE_DOCKERFILE: ${{ matrix.image.build.dockerfile }}
      IMAGE_TARGET: ${{ matrix.image.build.target }}
      LATEST_TAG: ${{ matrix.image.build.latest == true }}
      TAG_MAJOR_AND_MINOR: true
      BUILD_AMD64: true
      BUILD_ARM64: true
      USE_QEMU: false
      CACHE: true
      PROVENANCE: true
      SBOM: true
