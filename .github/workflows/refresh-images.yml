name: Refresh images

on:
  schedule:
  # Monthly on the 1st at 00:00 UTC - catches floating apt/apk package
  # updates that a pinned base-image bump alone would never trigger.
  - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      IMAGES:
        description: Comma separated list of images to refresh (leave empty for all active images)
        required: false
        type: string

jobs:
  refresh:
    name: Touch refresh markers
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: Checks-out repository
      uses: actions/checkout@v6

    - name: Touch refresh markers
      id: touch
      run: |
        if [ -n "${{ inputs.IMAGES }}" ]; then
          JQ_FILTER=$(echo "${{ inputs.IMAGES }}" | jq -R 'split(",")')
          CONTEXTS=$(jq -r --argjson names "$JQ_FILTER" '.[] | select(.name | IN($names[])) | select(.deprecated != true) | .build.context' ci/matrix.json | sort -u)
        else
          CONTEXTS=$(jq -r '.[] | select(.deprecated != true) | .build.context' ci/matrix.json | sort -u)
        fi

        for CTX in $CONTEXTS; do
          date -u +%Y-%m-%dT%H:%M:%SZ > "$CTX/.refresh"
        done

    - name: Commit and push
      run: |
        git config user.name github-actions[bot]
        git config user.email github-actions[bot]@users.noreply.github.com
        git add -- 'docker/utils/*/.refresh'
        if ! git diff --cached --quiet; then
          git commit -m "fix(docker): scheduled dependency refresh"
          git push
        else
          echo "No changes to commit"
        fi
